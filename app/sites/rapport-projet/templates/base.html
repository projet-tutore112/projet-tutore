<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ config.title }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        nav { background: #f0f0f0; padding: 10px; border-radius: 5px; }
        nav a { margin-right: 15px; text-decoration: none; font-weight: bold; }
        .hero { text-align: center; margin-bottom: 40px; }
        img { max-width: 100%; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

    .hero-section {
        text-align: center;
        padding: 40px 20px;
        background-color: #f8f9fa;
        border-radius: 8px;
        margin-bottom: 40px;
    }

    .hero-section h1 {
        color: #2c3e50;
        font-size: 2.5em;
        margin-bottom: 10px;
    }

    .subtitle {
        font-size: 1.2em;
        color: #666;
        margin-bottom: 30px;
    }

    .hero-image-container img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        border: 1px solid #ddd;
    }

    .why-section {
        text-align: center;
        max-width: 800px;
        margin: 0 auto 50px auto;
        padding: 0 20px;
    }
    
    .why-section h2 {
        border-bottom: 2px solid #007bff;
        display: inline-block;
        padding-bottom: 10px;
    }

    /* GRILLE 3 COLONNES */
    .features-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 30px;
        margin-bottom: 50px;
    }

    .feature-card {
        text-align: center;
        padding: 20px;
        border: 1px solid #eee;
        border-radius: 8px;
        transition: transform 0.2s;
    }
    
    .feature-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .feature-card .icon {
        font-size: 3em;
        margin-bottom: 15px;
    }

    .spacer {
        margin: 60px 0;
        border: 0;
        border-top: 1px solid #eee;
    }

    .shadow-img {
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        border-radius: 8px;
    }

    .tech-icon {
        font-size: 3em;
        margin-bottom: 15px;
    }

    .video-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
    }

    .video-card {
        background: #fff;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #eee;
        text-align: center;
    }

    .video-card h3 {
        font-size: 1.1em;
        margin-bottom: 10px;
        color: #444;
    }

    video {
        width: 100%;
        border-radius: 4px;
        background: #000;
        aspect-ratio: 16/9;
    }
    
    @media (max-width: 768px) {
        .reverse-mobile { flex-direction: column-reverse; }
    }

    .mission-list {
        list-style: none; /* Enlève les points noirs */
        padding: 0;
    }
    .mission-list li {
        margin-bottom: 10px;
        padding-left: 30px;
        position: relative;
        font-size: 1.1em;
    }
    .mission-list li::before {
        content: "✅"; /* Ajoute la coche verte */
        position: absolute;
        left: 0;
    }

    /* CARTES RÔLES */
    .role-card {
        text-align: center;
        border-top: 5px solid #ccc; /* Petite barre de couleur en haut */
    }
    .user-style { border-top-color: #4CAF50; } /* Vert pour user */
    .admin-style { border-top-color: #f44336; } /* Rouge pour admin */

    .role-card ul {
        margin-top: 10px;
        padding-left: 20px;
    }

    /* BOITE MISE EN AVANT (Phrase dynamique) */
    .highlight-box {
        background-color: #cf29f8; /* Bleu très clair */
        border-left: 5px solid #2196F3; /* Barre bleue à gauche */
        padding: 20px;
        margin: 40px 0;
        border-radius: 4px;
    }
    .highlight-box h3 { margin-top: 0; color: #0d47a1; }
    .highlight-box p { margin-bottom: 0; font-size: 1.1em; }
    </style>
</head>
<body>
<nav>
        <a href="{{ get_url(path="@/_index.md") }}">🏠 Accueil</a>
        
        <a href="{{ get_url(path="@/projet.md") }}">🚀 Le Projet</a>
        
        <a href="{{ get_url(path="@/technique.md") }}">⚙️ Technique</a>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
