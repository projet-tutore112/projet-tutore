<!DOCTYPE html>
<html>
<head>
    <title>{{ page.title }}</title>
</head>
<body>

<h1>{{ page.title }}</h1>

{% if page.extra.gallery %}
    <div>
        {% for image in page.extra.gallery %}
            <img src="{{ image }}" width="200">
        {% endfor %}
    </div>
{% endif %}

<p><strong>Prix :</strong> {{ page.extra.price }} €</p>
<p><strong>Stock :</strong> {{ page.extra.stock }}</p>

{{ page.content | safe }}

{% if page.extra.buy_link %}
    <a href="{{ page.extra.buy_link }}">Acheter maintenant</a>
{% endif %}

</body>
</html>
